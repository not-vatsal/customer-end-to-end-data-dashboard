<!DOCTYPE html>
<html>

<head>
    <title>Data Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>EndToEnd Dashboard</h1>
            <div id="loading" class="status-msg">Loading data...</div>
            <div id="error" class="status-msg error-msg" style="display:none;">Failed to load data</div>
        </header>

        <div class="grid">
            <!-- Revenue Chart -->
            <div class="card">
                <h2>Revenue Trend</h2>
                <div class="chart-container">
                    <div class="date-controls">
                        <input type="month" id="startDate" class="modern-input">
                        <input type="month" id="endDate" class="modern-input">
                        <button onclick="filterRevenue()" class="modern-btn">Apply</button>
                    </div>
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>

            <!-- Category Chart -->
            <div class="card">
                <h2>Category Performance</h2>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- Top Customers -->
            <div class="card">
                <h2>Top Customers</h2>
                <div class="table-container">
                    <div class="search-controls">
                        <input type="text" id="searchBox" placeholder="Search customer..." class="modern-input search-input">
                    </div>
                    <table id="customersTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Region</th>
                                <th>Total Spend</th>
                                <th>Churned</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Regional Data -->
            <div class="card">
                <h2>Regional Analysis</h2>
                <div class="table-container">
                    <table id="regionTable">
                        <thead>
                            <tr>
                                <th>Region</th>
                                <th>Customers</th>
                                <th>Orders</th>
                                <th>Revenue</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
